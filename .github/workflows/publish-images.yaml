name: Publish Docker Images

on:
  push:
    branches:
      - feat/create-and-publish-stateful-docker-images
  workflow_dispatch:
    inputs:
      tag:
        description: 'Bee git ref to build (branch, tag, or commit — e.g. v2.5.0). Uses "master" if omitted.'
        required: false
        default: 'master'

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run prepare

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Start bee-factory
        run: ./bin/bee-factory.js start --fresh --tag ${{ inputs.tag || 'master' }}

      - name: Commit and push images
        run: |
          INPUT_TAG="${{ inputs.tag || 'master' }}"

          # Always push the version tag; also push latest (master maps to latest only)
          if [ "$INPUT_TAG" = "master" ]; then
            TAGS=("latest")
          else
            TAGS=("$INPUT_TAG" "latest")
          fi

          # Dump the final Anvil chain state (post-traffic) into the container so
          # that --load-state /anvil-state.json restores it on next start.
          STATE_HEX=$(curl -s -X POST http://localhost:8545 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"anvil_dumpState","params":[],"id":1}' \
            | jq -r '.result')
          echo -n "$STATE_HEX" > /tmp/anvil-state.json
          docker cp /tmp/anvil-state.json bee-factory-anvil:/anvil-state.json

          # Contract addresses are stable after deployment; read from the snapshot
          # file written by bee-factory start during step 6.
          ADDRESSES=$(jq -c '.addresses' src/snapshot/anvil-state.json)

          for TAG in "${TAGS[@]}"; do
            IMAGE="ethersphere/bee-factory-blockchain:${TAG}"
            echo "Committing bee-factory-anvil → ${IMAGE}"
            docker commit \
              --change "LABEL org.ethswarm.beefactory.addresses=${ADDRESSES}" \
              bee-factory-anvil "${IMAGE}"
            docker push "${IMAGE}"

            docker commit bee-factory-bee-0 "ethersphere/bee-factory-queen:${TAG}" && docker push "ethersphere/bee-factory-queen:${TAG}"
            for I in 1 2 3 4; do
              IMAGE="ethersphere/bee-factory-worker-${I}:${TAG}"
              echo "Committing bee-factory-bee-${I} → ${IMAGE}"
              docker commit "bee-factory-bee-${I}" "${IMAGE}"
              docker push "${IMAGE}"
            done
          done

      - name: Stop bee-factory
        if: always()
        run: ./bin/bee-factory.js stop
