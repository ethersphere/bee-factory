name: Smoke Test

on:
  workflow_call:

jobs:
  smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install local dependencies
        run: npm ci

      - name: Install global dependencies
        run: npm install -g @ethersphere/swarm-cli

      - name: Compile
        run: npm run prepare

      - name: Start bee factory
        run: ./bin/bee-factory.js start

      - name: Test bee factory
        run: ./scripts/test-smoke.sh

      - name: Stop bee factory
        run: ./bin/bee-factory.js stop
