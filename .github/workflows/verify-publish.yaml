name: Verify Publish Pipeline

on:
  pull_request:
    branches:
      - '**'

# Two-stage emulation of the publish-images → smoke-test pipeline:
#
#   publish (this workflow) — builds bee + anvil, runs --fresh, commits the
#     six stateful images locally with the same `ethersphere/...:latest` tags
#     the real publish workflow uses, then `docker save`s them into a tar
#     uploaded as an artifact.
#
#   smoke-test (smoke-test.yaml, called below) — downloads the artifact,
#     `docker load`s it, then runs the standard smoke flow. Bee-factory's
#     prebuilt path finds the images already present locally and skips any
#     Docker Hub pull, so the test exercises the just-built images without
#     touching the real registry.
jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run prepare

      - name: Start bee-factory (fresh)
        run: ./bin/bee-factory.js start --fresh --tag master

      - name: Commit stateful images
        run: |
          docker stop bee-factory-bee-0 bee-factory-bee-1 bee-factory-bee-2 bee-factory-bee-3 bee-factory-bee-4

          curl -s -X POST http://localhost:8545 \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","method":"anvil_dumpState","params":[],"id":1}' \
            | jq -r '.result' > /tmp/anvil-state-hex.txt
          ADDRESSES=$(jq -c '.addresses' src/snapshot/anvil-state.json)
          jq -n --rawfile state /tmp/anvil-state-hex.txt --argjson addresses "$ADDRESSES" \
            '{"state":($state|rtrimstr("\n")),"addresses":$addresses}' > /tmp/anvil-state.json
          docker cp /tmp/anvil-state.json bee-factory-anvil:/anvil-state.json

          docker commit bee-factory-anvil ethersphere/bee-factory-blockchain:latest
          docker commit bee-factory-bee-0 ethersphere/bee-factory-queen:latest
          for I in 1 2 3 4; do
            docker commit "bee-factory-bee-${I}" "ethersphere/bee-factory-worker-${I}:latest"
          done

      - name: Stop bee-factory
        run: ./bin/bee-factory.js stop

      - name: Export images as tar
        run: |
          mkdir -p /tmp/bee-factory-images
          docker save -o /tmp/bee-factory-images/bee-factory-images.tar \
            ethersphere/bee-factory-blockchain:latest \
            ethersphere/bee-factory-queen:latest \
            ethersphere/bee-factory-worker-1:latest \
            ethersphere/bee-factory-worker-2:latest \
            ethersphere/bee-factory-worker-3:latest \
            ethersphere/bee-factory-worker-4:latest

      - name: Upload images artifact
        uses: actions/upload-artifact@v4
        with:
          name: bee-factory-images
          path: /tmp/bee-factory-images/bee-factory-images.tar
          retention-days: 1

  smoke-test:
    needs: publish
    uses: ./.github/workflows/smoke-test.yaml
    with:
      images-artifact: bee-factory-images
